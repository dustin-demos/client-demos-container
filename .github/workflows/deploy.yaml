name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-22.04
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # notes and clickmart pull pocket/superstatic as git deps; npm 8 rewrites the
      # git+https url to ssh for ls-remote, so force https to clone them anonymously.
      - name: Force HTTPS for GitHub git deps
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # roguelike needs the legacy gulp 3 + browserify toolchain (Node 10).
      - name: Setup Node 10
        uses: actions/setup-node@v4
        with:
          node-version: '10'
      - name: Build roguelike
        run: deno task roguelike:compile

      # currency (Vite 2), resize, and state-sync (esbuild/sass) build on Node 16.
      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - name: Build currency
        run: deno task currency:compile
      - name: Build resize
        run: deno task resize:compile
      - name: Build state-sync
        run: deno task state-sync:compile
      - name: Build valorant-blog
        run: deno task valorant-blog:compile
      - name: Build clickmart
        run: deno task clickmart:compile
      - name: Build onclick-notes
        run: deno task onclick-notes:compile

      # discord-queue uses node-sass, which only has a prebuilt binary for Node 14.
      - name: Setup Node 14
        uses: actions/setup-node@v4
        with:
          node-version: '14'
      - name: Build discord-queue
        run: deno task discord-queue:compile

      # reasonable (Vite 5 / vite-ssg) builds on Node 20.
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build reasonable
        run: deno task reasonable:compile

      - name: Assemble public
        run: deno task assemble

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --config fly.toml --remote-only
