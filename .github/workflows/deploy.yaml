name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-22.04
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # roguelike needs the legacy gulp 3 + browserify toolchain (Node 10).
      - name: Setup Node 10
        uses: actions/setup-node@v4
        with:
          node-version: '10'
      - name: Build roguelike
        run: deno task roguelike:compile

      # currency (Vite 2) and resize (esbuild/sass) build on Node 16.
      - name: Setup Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      - name: Build currency
        run: deno task currency:compile
      - name: Build resize
        run: deno task resize:compile

      - name: Assemble public
        run: deno task assemble

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --config fly.toml --remote-only
